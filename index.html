<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IPK Technical Assistant</title>
    <style>
        :root {
            --akzo-blue: #00529B;
            --accent-yellow: #fff9e6;
            --border-gold: #d4a017;
        }

        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            background-color: #f0f4f8;
            margin: 0; padding: 5px;
            color: #333;
            padding-top: env(safe-area-inset-top);
        }

        .app-container {
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            border: 2px solid var(--akzo-blue);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            min-height: 98vh;
        }

        header {
            background: var(--akzo-blue);
            color: #fff;
            padding: 16px;
            text-align: center;
        }

        header h1 { margin: 0; font-size: 16px; font-weight: normal; }

        .tool-selector-area {
            padding: 12px 15px;
            background: #eef2f6;
            border-bottom: 1px solid #ddd;
            margin-bottom: 10px; /* 타이틀 제거 후 여백 확보 */
        }

        .form-group { margin-bottom: 12px; position: relative; padding: 0 15px; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: var(--akzo-blue);
            margin-bottom: 4px;
        }

        .search-input, select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fff;
        }

        .search-results {
            position: absolute;
            top: 100%; left: 15px; right: 15px;
            background: white; border: 1px solid #ccc;
            z-index: 100; max-height: 180px; overflow-y: auto;
            display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .search-results div { padding: 12px; font-size: 15px; border-bottom: 1px solid #eee; }

        .result-section { display: none; padding-bottom: 20px; }
        .result-section.active { display: block; }

        .scroll-wrapper { margin: 10px; overflow-x: auto; border: 1.5px solid var(--akzo-blue); border-radius: 5px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 480px; background: white; }
        th { background: var(--akzo-blue); color: #fff; padding: 8px; font-size: 11px; border: 1px solid #00407a; }
        td { padding: 12px 4px; font-size: 14px; font-weight: bold; border: 1px solid #ddd; text-align: center; color: #f08c00; }

        .remark-box {
            margin: 10px 15px; padding: 12px; background: var(--accent-yellow);
            border-left: 5px solid var(--border-gold); font-size: 13px; font-weight: bold;
        }

        footer {
            padding: 15px;
            text-align: center;
            background-color: #f8f9fa;
            border-top: 1px solid #eee;
            margin-top: auto;
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header><h1>International Paint Korea</h1></header>

    <div class="tool-selector-area">
        <div class="form-group" style="padding: 0;">
            <label>Select Data Mode</label>
            <select id="mainToolSelector" onchange="switchTool()">
                <option value="interval">Coating Interval</option>
                <option value="drying">Drying Time</option>
                <option value="immersion">Immersion Time</option>
            </select>
        </div>
    </div>

    <div id="intervalSection" class="result-section active">
        <div class="form-group"><label>1. Base Product</label><input type="text" id="baseInput" class="search-input" placeholder="Search product..." oninput="searchBase()" autocomplete="off"><div id="baseResults" class="search-results"></div></div>
        <div class="form-group"><label>2. Apply Product</label><input type="text" id="applyInput" class="search-input" placeholder="Select Base first" oninput="searchApply()" disabled autocomplete="off"><div id="applyResults" class="search-results"></div></div>
        <div class="form-group"><label>3. Work Category</label><select id="workSelect" onchange="onWorkChange()" disabled><option value="">-- Select --</option></select></div>
        <div class="form-group"><label>4. Select Immersion Condition</label><select id="conditionSelect" onchange="updateIntervalResults()" disabled><option value="">-- Select --</option></select></div>
        <div id="intervalResultArea" style="min-height: 100px; text-align: center; color: #999; padding-top: 20px;">Select items to see interval data</div>
    </div>

    <div id="inspectSection" class="result-section">
        <div class="form-group"><label>1. Paint Name</label><select id="paintSelect" onchange="calcInspectTable()"></select></div>
        <div class="form-group"><label id="inspectTypeLabel">2. Work Category</label><select id="typeSelect" onchange="calcInspectTable()"></select></div>
        <div id="inspectResultArea" style="min-height: 100px; text-align: center; color: #999; padding-top: 20px;">Select items to see data</div>
    </div>

    <footer>
        <p style="margin: 0; font-size: 12px; color: #666; line-height: 1.4;">
            Created by: <strong>Lee Eunghak</strong><br>
            Email: <a href="mailto:hagiyo7705@gmail.com" style="color: var(--akzo-blue); text-decoration: none;">hagiyo7705@gmail.com</a>
        </p>
    </footer>
</div>

    function switchTool() {
        const mode = document.getElementById('mainToolSelector').value;
        const intervalSec = document.getElementById('intervalSection');
        const inspectSec = document.getElementById('inspectSection');

        intervalSec.classList.remove('active');
        inspectSec.classList.remove('active');

        if(mode === 'interval') {
            intervalSec.classList.add('active');
        } else {
            inspectSec.classList.add('active');
            initInspectData(mode);
        }
    }

    function searchBase() {
        const val = document.getElementById('baseInput').value.toLowerCase().trim();
        const resDiv = document.getElementById('baseResults');
        resDiv.innerHTML = '';
        if(!val) { resDiv.style.display = 'none'; return; }
        const filtered = [...new Set(intervalDB.map(i => i.base))].filter(b => b.toLowerCase().includes(val)).sort();
        if(filtered.length > 0) {
            resDiv.style.display = 'block';
            filtered.forEach(b => {
                const item = document.createElement('div');
                item.textContent = b;
                item.onclick = () => { document.getElementById('baseInput').value = b; resDiv.style.display = 'none'; selectBase(b); };
                resDiv.appendChild(item);
            });
        }
    }

    function selectBase(val) {
        document.getElementById('applyInput').disabled = false;
        document.getElementById('applyInput').value = '';
        document.getElementById('workSelect').disabled = true;
        document.getElementById('conditionSelect').disabled = true;
        document.getElementById('intervalResultArea').innerHTML = 'Select Apply Product';
    }

    function searchApply() {
        const baseVal = document.getElementById('baseInput').value;
        const val = document.getElementById('applyInput').value.toLowerCase().trim();
        const resDiv = document.getElementById('applyResults');
        resDiv.innerHTML = '';
        if(!val) { resDiv.style.display = 'none'; return; }
        const filtered = [...new Set(intervalDB.filter(i => i.base === baseVal).map(i => i.apply))].filter(a => a.toLowerCase().includes(val)).sort();
        if(filtered.length > 0) {
            resDiv.style.display = 'block';
            filtered.forEach(a => {
                const item = document.createElement('div');
                item.textContent = a;
                item.onclick = () => { document.getElementById('applyInput').value = a; resDiv.style.display = 'none'; selectApply(a); };
                resDiv.appendChild(item);
            });
        }
    }

    function selectApply(val) {
        const baseVal = document.getElementById('baseInput').value;
        const works = [...new Set(intervalDB.filter(i => i.base === baseVal && i.apply === val).map(i => i.work))];
        const ws = document.getElementById('workSelect');
        ws.innerHTML = '<option value="">-- Select --</option>';
        works.forEach(w => ws.add(new Option(w, w)));
        ws.disabled = false;
    }

    function onWorkChange() {
        const b = document.getElementById('baseInput').value;
        const a = document.getElementById('applyInput').value;
        const w = document.getElementById('workSelect').value;
        const conds = [...new Set(intervalDB.filter(i => i.base === b && i.apply === a && i.work === w).map(i => i.condition))];
        const cs = document.getElementById('conditionSelect');
        cs.innerHTML = '<option value="">-- Select --</option>';
        conds.forEach(c => cs.add(new Option(c, c)));
        cs.disabled = false;
    }

    function updateIntervalResults() {
        const b = document.getElementById('baseInput').value;
        const a = document.getElementById('applyInput').value;
        const w = document.getElementById('workSelect').value;
        const c = document.getElementById('conditionSelect').value;
        const match = intervalDB.find(i => i.base === b && i.apply === a && i.work === w && i.condition === c);
        if(match) { renderTable('intervalResultArea', match.data, match.remark); }
    }

    function initInspectData(mode) {
        const pSel = document.getElementById('paintSelect');
        const tySel = document.getElementById('typeSelect');
        pSel.innerHTML = ""; tySel.innerHTML = "";
        document.getElementById('inspectResultArea').innerHTML = "Select items to see data";

        if(mode === 'drying') {
            Object.keys(dryingData.values).sort().forEach(p => pSel.add(new Option(p, p)));
            dryingData.works.forEach(w => tySel.add(new Option(w, w)));
        } else {
            Object.keys(immersionData.values).sort().forEach(p => pSel.add(new Option(p, p)));
            immersionData.works.forEach(w => tySel.add(new Option(w, w)));
        }
        calcInspectTable();
    }

    function calcInspectTable() {
        const mode = document.getElementById('mainToolSelector').value;
        const paint = document.getElementById('paintSelect').value;
        const type = document.getElementById('typeSelect').value;
        if(!paint || !type) return;

        let results = [];
        if(mode === 'drying') {
            const key = type === "Dry to Touch" ? "t" : (type === "Possible to Access" ? "a" : "h");
            const dataObj = dryingData.values[paint][key];
            globalTemps.forEach(temp => results.push(dataObj[temp] || "-"));
        } else {
            const dataArr = immersionData.values[paint][type];
            for(let i=0; i<9; i++) results.push(dataArr[i] || "-");
        }
        renderTable('inspectResultArea', results, "-");
    }

    function renderTable(targetId, dataArray, remark) {
        const target = document.getElementById(targetId);
        target.innerHTML = `
            <div class="scroll-wrapper">
                <table>
                    <thead><tr>${globalTemps.map(t => `<th>${t}℃</th>`).join('')}</tr></thead>
                    <tbody><tr>${dataArray.map(d => `<td>${d}</td>`).join('')}</tr></tbody>
                </table>
            </div>
            ${remark && remark !== '-' ? `<div class="remark-box">REMARK: ${remark}</div>` : ''}
        `;
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.form-group')) {
            document.querySelectorAll('.search-results').forEach(r => r.style.display = 'none');
        }
    });

    window.onload = switchTool;
</script>
