            font-size: 22px;
            font-weight: 900;
            color: var(--akzo-blue);
            margin: 12px 0 8px 0;
            text-transform: uppercase;
        }

            content: '';
            display: block;
            width: 260px;
            height: 3px;
            background-color: #d4a017;
            margin: 4px auto 0;
        }

        .selection-area { padding: 10px 15px; flex-grow: 0; }

        .form-group { margin-bottom: 10px; position: relative; }

        .form-group label {

            font-size: 13px;
            font-weight: bold;
            color: var(--akzo-blue);
            margin-bottom: 3px;
        }

        .search-input, select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .search-results {
            position: absolute;
            top: 100%; left: 0; width: 100%;
            background: white; border: 1px solid #ccc;
            z-index: 100; max-height: 150px; overflow-y: auto;
            display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .search-results div { padding: 12px; font-size: 15px; border-bottom: 1px solid #eee; }

        .result-area { padding: 10px; border-top: 1px solid #eee; flex-grow: 1; }
        
        .scroll-wrapper { width: 100%; overflow-x: auto; border: 1.5 solid var(--akzo-blue); border-radius: 5px; }
        
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: var(--akzo-blue); color: #fff; padding: 6px; font-size: 11px; }
        td { padding: 12px 4px; font-size: 14px; font-weight: bold; border: 1px solid #ddd; text-align: center; }

        .empty-state { text-align: center; color: #666; font-size: 14px; padding: 30px 0; }

        .remark-box {
            margin-top: 10px; padding: 10px; background: #fff9e6;
            border-left: 5px solid #d4a017; font-size: 13px; font-weight: bold;
        }

        footer {
            padding: 15px;
            text-align: center;
            background-color: #f8f9fa;

<div class="app-container">

    <div class="selection-area">
        <div class="form-group">
            <label>1. Base Product</label>
            <input type="text" id="baseInput" class="search-input" placeholder="Input product name" oninput="searchBase()" autocomplete="off">
            <div id="baseResults" class="search-results"></div>
        </div>

        <div class="form-group">
            <label>2. Apply Product</label>
            <input type="text" id="applyInput" class="search-input" placeholder="Select Base first" oninput="searchApply()" disabled autocomplete="off">
            <div id="applyResults" class="search-results"></div>
        </div>

        <div class="form-group">
            <label>3. Kind of Work</label>
            <select id="workSelect" onchange="onWorkChange()" disabled>
                <option value="">-- Select --</option>
            </select>
        </div>

        <div class="form-group">
            <label>4. Condition</label>
            <select id="conditionSelect" onchange="updateResults()" disabled>
                <option value="">-- Select --</option>
            </select>
        </div>
    </div>

    <div class="result-area" id="resultArea">
        <div class="empty-state">Results will be shown upon entry</div>
    </div>

    const applyInput = document.getElementById('applyInput');
    const workSelect = document.getElementById('workSelect');
    const conditionSelect = document.getElementById('conditionSelect');
    const area = document.getElementById('resultArea');

    function searchBase() {
        const val = baseInput.value.toLowerCase().trim();
        const resDiv = document.getElementById('baseResults');
        resDiv.innerHTML = '';
        if(!val) { resDiv.style.display = 'none'; return; }
        const filtered = [...new Set(db.map(i => i.base))].filter(b => b.toLowerCase().includes(val)).sort();
        if(filtered.length > 0) {
            resDiv.style.display = 'block';
            filtered.forEach(b => {
                const item = document.createElement('div');
                item.textContent = b;
                item.onclick = () => { baseInput.value = b; resDiv.style.display = 'none'; selectBase(b); };
                resDiv.appendChild(item);
            });
        } else { resDiv.style.display = 'none'; }
    }

    function selectBase(val) {
        applyInput.disabled = false;
        applyInput.value = '';
        workSelect.disabled = true;
        conditionSelect.disabled = true;
        updateResults();
    }

    function searchApply() {
        const baseVal = baseInput.value;
        const val = applyInput.value.toLowerCase().trim();
        const resDiv = document.getElementById('applyResults');
        resDiv.innerHTML = '';
        if(!val) { resDiv.style.display = 'none'; return; }
        const filtered = [...new Set(db.filter(i => i.base === baseVal).map(i => i.apply))].filter(a => a.toLowerCase().includes(val)).sort();
        if(filtered.length > 0) {
            resDiv.style.display = 'block';
            filtered.forEach(a => {
                const item = document.createElement('div');
                item.textContent = a;
                item.onclick = () => { applyInput.value = a; resDiv.style.display = 'none'; selectApply(a); };
                resDiv.appendChild(item);
            });
        } else { resDiv.style.display = 'none'; }
    }

    function selectApply(val) {
        const baseVal = baseInput.value;
        const works = [...new Set(db.filter(i => i.base === baseVal && i.apply === val).map(i => i.work))];
        workSelect.innerHTML = '<option value="">-- Select --</option>';
        works.forEach(w => { const opt = document.createElement('option'); opt.value = w; opt.textContent = w; workSelect.appendChild(opt); });
        workSelect.disabled = false;
        updateResults();
    }

    function onWorkChange() {
        const b = baseInput.value;
        const a = applyInput.value;
        const w = workSelect.value;
        const conditions = [...new Set(db.filter(i => i.base === b && i.apply === a && i.work === w).map(i => i.condition))];
        conditionSelect.innerHTML = '<option value="">-- Select --</option>';
        conditions.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c; conditionSelect.appendChild(opt); });
        conditionSelect.disabled = false;
        updateResults();
    }

    function updateResults() {
        const b = baseInput.value;
        const a = applyInput.value;
        const w = workSelect.value;
        const c = conditionSelect.value;

        if(!b || !a || !w || !c) {
            area.innerHTML = '<div class="empty-state">Results will be shown upon entry</div>';
            return;
        }

        const match = db.find(i => i.base === b && i.apply === a && i.work === w && i.condition === c);
        if(match) {
            // [결과 테이블만 교체] footer는 HTML에 따로 있으므로 지워지지 않습니다.
            area.innerHTML = `
                <div class="scroll-wrapper">
                    <table>
                        <thead><tr><th>-5℃</th><th>0℃</th><th>5℃</th><th>10℃</th><th>15℃</th><th>20℃</th><th>25℃</th><th>30℃</th><th>35℃</th></tr></thead>
                        <tbody><tr>${match.data.map(d => `<td>${d || '-'}</td>`).join('')}</tr></tbody>
                    </table>
                </div>
                ${match.remark !== '-' ? `<div class="remark-box"><strong>Remark:</strong> ${match.remark}</div>` : ''}
            `;
        }
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.form-group')) {
            document.querySelectorAll('.search-results').forEach(r => r.style.display = 'none');
        }
    });
