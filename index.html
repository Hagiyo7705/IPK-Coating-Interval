header {

header h1 { margin: 0; font-size: var(--font-size-title); }

/* 중앙 문구 크기 및 여백 대폭 축소 */
.main-topic {
    text-align: center;
    font-size: 24px; 
    font-weight: 900;
    color: var(--akzo-blue);
    margin: 10px 0; /* 위아래 간격 최소화 */
    text-transform: uppercase;
}

.main-topic::after {
    content: '';
    display: block;
    width: 280px;
    height: 3px;
    background-color: #d4a017;
    margin: 5px auto 0;
}

.selection-area { padding: 10px 15px; }

.form-group { margin-bottom: 12px; position: relative; } /* 간격 축소 */

.form-group label {
    display: block;
    font-size: 14px; /* 라벨은 작게 */
    font-weight: bold;
    color: var(--akzo-blue);
    margin-bottom: 4px;
}

/* 입력창 및 선택창 크기 최적화 */
.search-input, select {
    width: 100%;
    padding: 10px; 
    font-size: 16px; 
    font-weight: bold;
    border: 1.5px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}

/* 결과 테이블 밀도 높임 */
.result-area { padding: 10px; border-top: 2px solid #eee; }

th { 
    background: var(--akzo-blue); 
    color: #fff; 
    padding: 6px 2px; 
    font-size: 11px; /* 온도 칸 글자 축소 */
}

td { 
    padding: 10px 2px; 
    font-size: 14px; /* 데이터 글자 크기 조정 */
    font-weight: bold;
    border: 1px solid #ddd; 
}

/* 비고란 컴팩트하게 */
.remark-box {
    margin-top: 8px;
    padding: 8px;
    font-size: 13px;
}
        select {
            width: 100%; padding: 15px; font-size: 20px; font-weight: bold;
            border: 2px solid #ccc; border-radius: 10px; cursor: pointer;
        }

        .scroll-wrapper { width: 100%; overflow-x: auto; border: 2px solid var(--akzo-blue); border-radius: 10px; }

        th { background: var(--akzo-blue); color: #fff; padding: 12px; font-size: 16px; }
        td { padding: 18px 10px; font-size: 20px; font-weight: bold; border: 1px solid #ddd; text-align: center; }

            <label>3. Kind of Work</label>
            <select id="workSelect" onchange="onWorkChange()" disabled>

        </div>

    const baseInput = document.getElementById('baseInput');
    const applyInput = document.getElementById('applyInput');
    const workSelect = document.getElementById('workSelect');
    const conditionSelect = document.getElementById('conditionSelect');
    const area = document.getElementById('resultArea');

    // 1. Base 검색 기능
    function searchBase() {
        const val = baseInput.value.toLowerCase();
        const resDiv = document.getElementById('baseResults');
        resDiv.innerHTML = '';
        if(!val) { resDiv.style.display = 'none'; return; }

        const filtered = [...new Set(db.map(i => i.base))].filter(b => b.toLowerCase().includes(val)).sort();
        
        if(filtered.length > 0) {
            resDiv.style.display = 'block';
            filtered.forEach(b => {
                const item = document.createElement('div');
                item.textContent = b;
                item.onclick = () => selectBase(b);
                resDiv.appendChild(item);
            });
        } else { resDiv.style.display = 'none'; }
    }

    function selectBase(val) {
        baseInput.value = val;
        document.getElementById('baseResults').style.display = 'none';
        
        // 초기화
        applyInput.disabled = false;
        applyInput.value = '';
        applyInput.placeholder = "Type to search...";
        workSelect.disabled = true;
        conditionSelect.disabled = true;
        updateResults();
    }

    // 2. Apply 검색 기능
    function searchApply() {
        const baseVal = baseInput.value;
        const val = applyInput.value.toLowerCase();
        const resDiv = document.getElementById('applyResults');
        resDiv.innerHTML = '';
        if(!val) { resDiv.style.display = 'none'; return; }

        const filtered = [...new Set(db.filter(i => i.base === baseVal).map(i => i.apply))].filter(a => a.toLowerCase().includes(val)).sort();

        if(filtered.length > 0) {
            resDiv.style.display = 'block';
            filtered.forEach(a => {
                const item = document.createElement('div');
                item.textContent = a;
                item.onclick = () => selectApply(a);
                resDiv.appendChild(item);
            });
        } else { resDiv.style.display = 'none'; }
    }

    function selectApply(val) {
        applyInput.value = val;
        document.getElementById('applyResults').style.display = 'none';
        
        // Work 카테고리 로드
        const baseVal = baseInput.value;
        const works = [...new Set(db.filter(i => i.base === baseVal && i.apply === val).map(i => i.work))];
        
        workSelect.innerHTML = '<option value="">-- Select --</option>';
        works.forEach(w => {
            const opt = document.createElement('option');
            opt.value = w; opt.textContent = w;
            workSelect.appendChild(opt);
        });
        workSelect.disabled = false;
        updateResults();
    }

    function onWorkChange() {
        const b = baseInput.value;
        const a = applyInput.value;
        const w = workSelect.value;

        const conditions = [...new Set(db.filter(i => i.base === b && i.apply === a && i.work === w).map(i => i.condition))];
        conditionSelect.innerHTML = '<option value="">-- Select --</option>';
        conditions.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            conditionSelect.appendChild(opt);
        });
        conditionSelect.disabled = false;
        updateResults();
    }

    function updateResults() {
        const b = baseInput.value;
        const a = applyInput.value;
        const w = workSelect.value;
        const c = conditionSelect.value;

        if(!b || !a || !w || !c) {
            area.innerHTML = '<div class="empty-state">모든 항목을 선택해 주세요.</div>';
            return;
        }

        const match = db.find(i => i.base === b && i.apply === a && i.work === w && i.condition === c);
        if(match) {
            area.innerHTML = `
                <div class="scroll-wrapper">
                    <table>
                        <thead><tr><th>-5℃</th><th>0℃</th><th>5℃</th><th>10℃</th><th>15℃</th><th>20℃</th><th>25℃</th><th>30℃</th><th>35℃</th></tr></thead>
                        <tbody><tr>${match.data.map(d => `<td>${d || '-'}</td>`).join('')}</tr></tbody>
                    </table>
                </div>`;
        }
    }

    // 바탕 클릭 시 결과창 닫기
    document.addEventListener('click', function(e) {
        if (!e.target.classList.contains('search-input')) {
            document.querySelectorAll('.search-results').forEach(r => r.style.display = 'none');
        }
    });
